services:
  - type: web
    name: mtaka-backend
    runtime: python
    plan: free
    rootDir: mtaka-backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/auth/users/
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DJANGO_CORS_ALLOWED_ORIGIN_REGEXES
        value: "^https://.*\\.onrender\\.com$"
      - key: DJANGO_JWT_COOKIE_SECURE
        value: "true"
      - key: PYTHON_VERSION
        value: "3.12.6"

  - type: web
    name: mtaka-frontend
    runtime: static
    rootDir: mtaka-frontend
    buildCommand: npm ci --include=dev --include=optional --no-audit --no-fund && npm i @rollup/rollup-linux-x64-gnu --no-save --no-audit --no-fund && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: mtaka-backend
          envVarKey: RENDER_EXTERNAL_HOSTNAME
      - key: NODE_VERSION
        value: "22.12.0"
